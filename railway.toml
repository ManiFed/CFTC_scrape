[build]
builder = "DOCKERFILE"

[deploy]
# Explicitly use the startup script that binds Streamlit to Railway's PORT.
startCommand = "./start.sh"

# Streamlit's built-in health endpoint.
healthcheckPath = "/_stcore/health"

# Give the container time to warm up on first boot.
healthcheckTimeout = 300

restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Keep a single web replica unless you intentionally scale out.
numReplicas = 1
