[build]
builder = "DOCKERFILE"

[deploy]
# Explicitly use the startup script that binds Streamlit to Railway's PORT.
startCommand = "./start.sh"
preDeployCommand = "alembic upgrade head && cftc create-tables && cftc init-docket --docket \"3116\" --url \"https://comments.cftc.gov/PublicComments/CommentList.aspx?id=3116\" --title \"Margin Requirements for Uncleared Swaps\" && cftc run --docket 3116"

# Streamlit's built-in health endpoint.
healthcheckPath = "/_stcore/health"

# Give the container time to warm up on first boot.
healthcheckTimeout = 300

restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Keep a single web replica unless you intentionally scale out.
numReplicas = 1
